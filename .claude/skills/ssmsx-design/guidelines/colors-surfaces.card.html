<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & text" subtitle="Layered grays for panels, plus primary / secondary ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; padding: 18px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border: 1px solid var(--border-default); border-radius: var(--radius-sm); overflow: hidden; }
  .chip { height: 56px; }
  .meta { padding: 6px 8px; font-size: 10px; line-height: 1.5; }
  .name { color: var(--text-primary); font-weight: 600; }
  .hex { color: var(--text-secondary); font-family: var(--font-mono); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--surface-app)"></div><div class="meta"><div class="name">app</div><div class="hex">#F8F9FA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-panel)"></div><div class="meta"><div class="name">panel</div><div class="hex">#E9ECEF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="meta"><div class="name">raised</div><div class="hex">#DEE2E6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-input)"></div><div class="meta"><div class="name">input</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-primary)"></div><div class="meta"><div class="name">text primary</div><div class="hex">#1A1A1A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-secondary)"></div><div class="meta"><div class="name">text secondary</div><div class="hex">#374151</div></div></div>
  </div>
</body>
</html>
