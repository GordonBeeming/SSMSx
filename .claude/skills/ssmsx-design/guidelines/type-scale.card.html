<!-- @dsCard group="Type" viewport="700x180" name="UI type scale" subtitle="Native OS font — the compact scale used throughout the app" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; padding: 20px; color: var(--text-primary); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-default); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); width: 130px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="line"><span class="tag">lg · 18 / 400</span><span style="font-size:var(--text-lg)">Connect to a SQL Server to get started</span></div>
  <div class="line"><span class="tag">base · 16 / 600</span><span style="font-size:var(--text-base);font-weight:600">Connect to Server</span></div>
  <div class="line"><span class="tag">sm · 14 / 500</span><span style="font-size:var(--text-sm);font-weight:500">Local Dev — Northwind</span></div>
  <div class="line"><span class="tag">xs · 12 / 400</span><span style="font-size:var(--text-xs)">dbo.Customer · 14,203 rows · 00:00:00.214</span></div>
  <div class="line"><span class="tag">2xs · 11 / 500</span><span style="font-size:var(--text-2xs);font-weight:500">SQL · ENTRA · CS</span></div>
</body>
</html>
