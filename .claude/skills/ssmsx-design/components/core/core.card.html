<!-- @dsCard group="Components" viewport="700x220" name="Buttons & Inputs" subtitle="Action buttons (primary / ghost / dashed / danger) and text fields" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-panel); padding: 24px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font-size: var(--text-2xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-secondary); width: 64px; flex-shrink: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Input } = window.SSMSXDesignSystem_453330;
  const Run = () => <span style={{ color: "var(--status-success)" }}>▶</span>;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Action</span>
          <Button variant="primary">Connect</Button>
          <Button variant="secondary">Cancel</Button>
          <Button variant="ghost" leadingIcon={<Run/>}>Execute</Button>
          <Button variant="dashed" size="xs">+ New Connection</Button>
          <Button variant="danger" size="sm">Delete</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Size</span>
          <Button variant="primary" size="xs">xs</Button>
          <Button variant="primary" size="sm">sm</Button>
          <Button variant="primary" size="md">md</Button>
        </div>
        <div className="row">
          <span className="lbl">Field</span>
          <div style={{ width: 260 }}><Input placeholder="Search connections..." defaultValue="" /></div>
          <div style={{ width: 200 }}><Input size="md" placeholder="localhost,1433" /></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
