<!-- @dsCard group="Components" viewport="700x230" name="Badges & Connection rows" subtitle="Metadata chips and saved-connection list items" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-panel); padding: 24px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font-size: var(--text-2xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-secondary); width: 64px; flex-shrink: 0; }
  .list { width: 360px; background: var(--surface-app); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 4px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, ConnectionItem } = window.SSMSXDesignSystem_453330;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Chips</span>
          <Badge>SQL</Badge>
          <Badge>CS</Badge>
          <Badge>Entra</Badge>
          <Badge tone="accent">Selected</Badge>
          <Badge tone="success">Completed</Badge>
          <Badge tone="error">Failed</Badge>
          <Badge tone="warning">Cancelled</Badge>
        </div>
        <div className="row" style={{ alignItems: "flex-start" }}>
          <span className="lbl">Rows</span>
          <div className="list">
            <ConnectionItem name="Prod — Reporting" serverName="sql-prod-01.db" database="Sales" username="reader" authType="EntraMfa" color="var(--conn-red)" />
            <ConnectionItem name="Local Dev" serverName="localhost,1433" database="Northwind" username="sa" authType="SqlAuth" color="var(--conn-green)" selected />
            <ConnectionItem serverName="staging.internal" database="App" authType="ConnectionString" color="var(--conn-amber)" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
